<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ArchonOS{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: { primary: '#0d1117', secondary: '#161b22', tertiary: '#21262d', elevated: '#30363d' },
                        text: { primary: '#e6edf3', secondary: '#8b949e', muted: '#6e7681' },
                        accent: { cyan: '#58a6ff', green: '#3fb950', yellow: '#d29922', red: '#f85149', purple: '#a371f7' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: #30363d; color: #e6edf3; }
        .btn-secondary:hover { background: #3d444d; }
        .input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px; border-radius: 6px; width: 100%; }
        .input:focus { outline: none; border-color: #58a6ff; }
        mark { background: #3fb950; color: #0d1117; padding: 0 2px; border-radius: 2px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
    <header class="border-b border-gray-700 bg-bg-secondary">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-accent-cyan rounded-lg flex items-center justify-center font-bold text-bg-primary">A</div>
                <span class="font-bold text-lg">ArchonOS</span>
            </div>
            <nav class="flex items-center gap-4">
                <a href="/" class="text-text-secondary hover:text-text-primary {% if request.url.path == '/' %}text-accent-cyan{% endif %}">Dashboard</a>
                <a href="/kb" class="text-text-secondary hover:text-text-primary {% if request.url.path == '/kb' %}text-accent-cyan{% endif %}">Knowledge</a>
                <a href="/memory" class="text-text-secondary hover:text-text-primary {% if request.url.path == '/memory' %}text-accent-cyan{% endif %}">Memory</a>
                <a href="/workflows" class="text-text-secondary hover:text-text-primary {% if request.url.path == '/workflows' %}text-accent-cyan{% endif %}">Workflows</a>
                <a href="/settings" class="text-text-secondary hover:text-text-primary {% if request.url.path == '/settings' %}text-accent-cyan{% endif %}">⚙️</a>
            </nav>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-gray-700 mt-12 py-4 text-center text-text-muted text-sm">
        <span class="text-accent-green">●</span> Online | v0.1.0 | SQLite
    </footer>
</body>
</html>
