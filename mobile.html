<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050507">
    <title>ArchonOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        :root {
            --bg: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --accent: #00d992;
            --accent-dim: #00a86b;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --border: #38383a;
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }

        .status-bar {
            height: var(--safe-area-inset-top);
            background: var(--bg);
        }

        .header {
            padding: 16px 20px 12px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--bg-secondary);
            border: 1.5px solid var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--accent);
            background: rgba(0, 217, 146, 0.12);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent);
        }

        .search-container {
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            font-size: 17px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .search-bar::placeholder {
            color: var(--text-tertiary);
        }

        .search-bar:focus {
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 18px;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 20px 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .quick-actions::-webkit-scrollbar {
            display: none;
        }

        .quick-action {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
        }

        .quick-action-icon {
            font-size: 16px;
        }

        .content {
            flex: 1;
            padding: 0 20px 20px;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            transition: transform 0.15s;
        }

        .stat-card:active {
            transform: scale(0.98);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
        }

        .stat-value.accent { color: var(--accent); }

        .chat-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .chat-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .chat-section-title {
            font-size: 14px;
            font-weight: 600;
        }

        .chat-messages {
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
        }

        .chat-message {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .chat-message.user {
            background: var(--accent);
            color: var(--bg);
            margin-left: 20px;
        }

        .chat-message.assistant {
            background: var(--bg-tertiary);
            margin-right: 20px;
        }

        .input-area {
            padding: 12px 20px;
            padding-bottom: calc(12px + var(--safe-area-inset-bottom));
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 12px;
            font-size: 16px;
            color: var(--text);
            font-family: inherit;
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--bg);
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 20px;
            padding-bottom: calc(8px + var(--safe-area-inset-bottom));
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 10px;
            transition: color 0.15s;
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tab-icon {
            font-size: 22px;
        }

        .pull-hint {
            text-align: center;
            padding: 20px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="status-bar"></div>
    
    <div class="header">
        <div class="header-top">
            <div class="logo-row">
                <div class="logo-icon">⚡</div>
                <span class="logo-text">ArchonOS</span>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                Online
            </div>
        </div>
        
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-bar" placeholder="Search knowledge, ask anything..." id="searchInput">
        </div>
    </div>

    <div class="quick-actions">
        <button class="quick-action" onclick="quickAction('summarize')">
            <span class="quick-action-icon">📝</span> Summarize
        </button>
        <button class="quick-action" onclick="quickAction('find')">
            <span class="quick-action-icon">🔎</span> Find
        </button>
        <button class="quick-action" onclick="quickAction('memory')">
            <span class="quick-action-icon">💾</span> Memory
        </button>
        <button class="quick-action" onclick="quickAction('chat')">
            <span class="quick-action-icon">💬</span> Chat
        </button>
    </div>

    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Documents</div>
                <div class="stat-value accent" id="docCount">127</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Chunks</div>
                <div class="stat-value accent" id="chunkCount">1,453</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Memories</div>
                <div class="stat-value" id="memCount">89</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Workflows</div>
                <div class="stat-value" id="wfCount">12</div>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-section-header">
                <span class="chat-section-title">Quick Chat</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message assistant">
                    Hi! What would you like to do?
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" class="input-field" id="chatInput" placeholder="Ask anything...">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="#" class="tab-item active">
            <span class="tab-icon">🏠</span>
            Home
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">📚</span>
            Knowledge
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">💾</span>
            Memory
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">⚙️</span>
            Settings
        </a>
    </div>

    <script>
        // Server URL - change this to your server address
        const SERVER_URL = 'http://100.94.69.84:8092';
        let conversation = [];

        // Load stats from server
        async function loadStats() {
            try {
                const res = await fetch(`${SERVER_URL}/api/stats`);
                const data = await res.json();
                document.getElementById('docCount').textContent = data.documents || 127;
                document.getElementById('chunkCount').textContent = data.chunks || '1,453';
                document.getElementById('memCount').textContent = data.memories || 89;
                document.getElementById('wfCount').textContent = data.workflows || 12;
            } catch (e) {
                console.log('Using demo stats');
            }
        }

        // Quick actions
        function quickAction(action) {
            const input = document.getElementById('chatInput');
            switch(action) {
                case 'summarize':
                    input.placeholder = 'What would you like me to summarize?';
                    break;
                case 'find':
                    input.placeholder = 'Search for...';
                    break;
                case 'memory':
                    input.placeholder = 'What should I remember?';
                    break;
                case 'chat':
                    input.placeholder = 'Ask anything...';
                    break;
            }
            input.focus();
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            const loading = addMessage('Thinking...', 'assistant', true);

            try {
                const res = await fetch(`${SERVER_URL}/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg, conversation})
                });
                const data = await res.json();
                loading.remove();
                addMessage(data.response, 'assistant');
                conversation.push({role: 'assistant', content: data.response});
            } catch (e) {
                loading.remove();
                addMessage('Demo mode: Connect your server to enable chat.', 'assistant');
            }
        }

        function addMessage(text, type, isLoading = false) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `chat-message ${type}`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('searchInput').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (query) {
                    document.getElementById('chatInput').value = query;
                    document.getElementById('chatInput').focus();
                }
            }
        });

        loadStats();
    </script>
</body>
</html>
